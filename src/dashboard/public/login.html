<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΔNEUTRAL // LOGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b0d;
      --surface: #0d1117;
      --bd: #1a2230;
      --bd-md: #243040;
      --tx: #c9d9e8;
      --tx-dim: #6b8099;
      --tx-muted: #2a3d50;
      --green: #34d399;
      --accent: #f59e0b;
      --mono: 'Share Tech Mono', 'Courier New', monospace;
      --disp: 'Orbitron', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--bd-md);
      padding: 40px 48px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .brand-name {
      font-family: var(--disp);
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 0.68rem;
      letter-spacing: 3px;
      color: var(--tx-dim);
      margin-bottom: 36px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--bd);
      margin: 28px 0;
    }

    .login-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--tx-dim);
      margin-bottom: 20px;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #202124;
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 1px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .google-btn:hover { opacity: 0.88; }

    .google-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.65rem;
      color: var(--tx-muted);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand-name">ΔNEUTRAL</div>
    <div class="brand-sub">HEDGE MONITOR</div>
    <hr class="divider">
    <div class="login-label">SIGN IN TO ACCESS YOUR DASHBOARD</div>
    <a class="google-btn" href="/auth/google">
      <!-- Google "G" logo -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      SIGN IN WITH GOOGLE
    </a>
    <div class="footer">ACCESS RESTRICTED TO AUTHORIZED ACCOUNTS</div>
  </div>
</body>
</html>
